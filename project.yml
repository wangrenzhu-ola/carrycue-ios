name: CarryCue
options:
  deploymentTarget:
    iOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.appfactory.carrycue
targets:
  CarryCue:
    type: application
    platform: iOS
    sources:
      - CarryCueApp
      - CarryCueCore
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: CarryCueApp/Info.plist
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    scheme:
      testTargets: [CarryCueTests]
  CarryCueTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: CarryCue
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
